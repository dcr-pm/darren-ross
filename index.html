<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Darren Ross — Technical Project & Product Manager, Leadership Coach & Digital Builder. SFMC expert helping teams ship better products." />
    <title>Darren Ross — Technical Project &amp; Product Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              'brand-primary': '#0D9488',
              'brand-secondary': '#14B8A6',
              'brand-accent': '#2DD4BF',
              'base-100': '#0B1120',
              'base-200': '#151D2E',
              'base-300': '#1E293B',
              'base-400': '#334155',
              'text-primary': '#F1F5F9',
              'text-secondary': '#94A3B8',
              'text-muted': '#64748B',
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
              'fade-in': 'fadeIn 0.8s ease-out forwards',
              'slide-in-left': 'slideInLeft 0.6s ease-out forwards',
              'slide-in-right': 'slideInRight 0.6s ease-out forwards',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(24px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideInLeft: {
                '0%': { opacity: '0', transform: 'translateX(-24px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              slideInRight: {
                '0%': { opacity: '0', transform: 'translateX(24px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
            },
          },
        },
      }
    </script>
